name: Deploy Docs

on:
    push:
        branches:
            - main
        paths:
            - "docs/**"
            - ".github/workflows/deploy-docs.yml"
    workflow_dispatch:

permissions:
    contents: read
    pages: write
    id-token: write

concurrency:
    group: pages
    cancel-in-progress: false

jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6

            - uses: pnpm/action-setup@v4
              with:
                  version: 10.17.0

            - uses: actions/setup-node@v7
              with:
                  node-version: 22
                  cache: pnpm

            - name: Install dependencies
              run: pnpm install

            - name: Build docs
              run: pnpm --filter @maronn-oidc/docs build:doc

            - uses: actions/upload-pages-artifact@v3
              with:
                  path: docs/library-document/dist

    deploy:
        needs: build
        runs-on: ubuntu-latest
        environment:
            name: github-pages
            url: ${{ steps.deployment.outputs.page_url }}
        steps:
            - name: Deploy to GitHub Pages
              id: deployment
              uses: actions/deploy-pages@v4
